# x86-smoke.yml — x86_64 validation suite for vxlan-tracer
#
# Separated into three jobs:
#   unit-build:    Go unit tests and binary build (no BPF, no root)
#   bpf-scenario:  BPF compilation, stale-object integration test, 6-scenario suite
#   human-output:  validate structured human-readable output for 3 verdict paths
#
# What this proves if all jobs pass:
#   - Go unit tests pass on x86_64
#   - BPF compilation with __TARGET_ARCH_x86 works
#   - BPF verifier accepts all programs on x86_64 kernel
#   - Stale BPF object causes fail-closed loader error with correct stderr
#   - No TC filters left after stale-object failure
#   - All 6 scenario verdicts are correct on x86_64 including port 8472
#   - Human-readable output contains correct Verdict/Evidence/Recommendation/Scope sections
#
# What it does NOT prove:
#   - Production Kubernetes environments
#   - VXLAN-specific scoping of ip_do_fragment (still global)
#   - Other x86_64 kernel versions
#   - Real CNI (k3s/flannel) validation — requires a two-node cluster

name: x86_64 validation suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-build:
    name: Unit tests + binary build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Go build dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq make
          go version

      - name: Run Go unit tests
        run: go test ./... -v 2>&1 | tee /tmp/unit-test.log

      - name: go vet
        run: go vet ./...

      - name: Build Go binary
        run: |
          make build
          echo "=== Binary ==="
          ls -lh dist/vxlan-tracer
          file dist/vxlan-tracer
          dist/vxlan-tracer --version

      - name: Upload unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-log
          path: /tmp/unit-test.log
          if-no-files-found: ignore
          retention-days: 7

  bpf-scenario:
    name: BPF compile + stale-object test + 6-scenario suite
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture kernel and architecture
        run: |
          echo "=== uname -a ===" && uname -a
          echo "=== arch ===" && uname -m
          echo "=== distro ===" && grep -E 'PRETTY_NAME|VERSION_ID' /etc/os-release
          echo "=== BTF ===" && ls -lh /sys/kernel/btf/vmlinux 2>/dev/null || echo "BTF: NOT FOUND"
          echo "=== bpffs ===" && mount | grep bpf || echo "bpffs: not mounted"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            clang llvm libbpf-dev linux-tools-generic linux-tools-$(uname -r) \
            iproute2 iputils-ping iptables python3 python3-pip \
            make gcc build-essential gcc-multilib
          sudo pip3 install scapy --quiet
          clang --version | head -1
          go version

      - name: Mount bpffs
        run: sudo bash scripts/setup-bpf-fs.sh

      - name: Run preflight check
        run: sudo bash scripts/preflight.sh
        continue-on-error: true

      - name: Compile BPF objects (x86_64 — __TARGET_ARCH_x86)
        run: |
          sudo make clean-bpf
          sudo make bpf
          echo "=== BPF objects ===" && ls -lh bpf/*.bpf.o
          echo "=== bpf-verify ===" && make bpf-verify

      - name: Build Go binary
        run: |
          make build
          ls -lh dist/vxlan-tracer
          file dist/vxlan-tracer
          dist/vxlan-tracer --version

      - name: Stale BPF object integration test
        run: |
          echo "=== Stale BPF object integration test ===" | tee /tmp/stale-bpf-test.log
          sudo BINARY=dist/vxlan-tracer \
            bash scripts/test-stale-bpf-object.sh 2>&1 | tee -a /tmp/stale-bpf-test.log
          echo "Exit: $?" | tee -a /tmp/stale-bpf-test.log

      - name: Run 6-scenario suite (includes port 8472)
        run: |
          echo "=== Running 6-scenario suite on $(uname -r) x86_64 ==="
          sudo BINARY=dist/vxlan-tracer BPF_DIR=bpf DURATION=15s \
            bash scripts/run-scenarios.sh 2>&1 | tee /tmp/scenario-results.log
          echo "=== Results ==="
          grep -E '\[PASS\]|\[FAIL\]|Results:|vxlan_port' /tmp/scenario-results.log || true
        continue-on-error: true

      - name: Upload BPF and scenario logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-logs-x86_64
          path: |
            /tmp/stale-bpf-test.log
            /tmp/scenario-*.log
            /tmp/vxlan-lab-http.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "=== x86_64 BPF+scenario summary ==="
          echo "Kernel: $(uname -r)"
          echo "Arch: $(uname -m)"
          echo "Go: $(go version)"
          echo "clang: $(clang --version 2>/dev/null | head -1)"
          echo "BTF: $(ls /sys/kernel/btf/vmlinux 2>/dev/null && echo 'present' || echo 'absent')"
          echo "tc_ingress size: $(wc -c < bpf/tc_ingress_eth0.bpf.o 2>/dev/null || echo 'not found') bytes"
          if [[ -f /tmp/scenario-results.log ]]; then
            echo "=== Scenario results ==="
            grep -E '\[PASS\]|\[FAIL\]|Results:|vxlan_port' /tmp/scenario-results.log || echo "(no scenario output)"
          fi

  human-output:
    name: Human-readable output validation
    runs-on: ubuntu-22.04
    needs: bpf-scenario

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            clang llvm libbpf-dev linux-tools-generic linux-tools-$(uname -r) \
            iproute2 iputils-ping iptables python3 python3-pip \
            make gcc build-essential gcc-multilib
          sudo pip3 install scapy --quiet

      - name: Mount bpffs
        run: sudo bash scripts/setup-bpf-fs.sh

      - name: Compile BPF objects and binary
        run: |
          sudo make clean-bpf && sudo make bpf
          make build
          dist/vxlan-tracer --version

      - name: Validate human output — VXLAN_FRAGMENTATION_OBSERVED
        run: |
          echo "=== Human output: VXLAN_FRAGMENTATION_OBSERVED ===" | tee /tmp/human-frag.log
          # Setup: stale-MTU lab (overlay 1450, underlay 1400)
          sudo ip netns add ho-ns1 2>/dev/null || true
          sudo ip link add ho-veth1 type veth peer name ho-veth2
          sudo ip link set ho-veth1 netns ho-ns1
          sudo ip link set ho-veth2 netns ho-ns1
          sudo ip netns exec ho-ns1 ip addr add 10.99.1.1/24 dev ho-veth1
          sudo ip netns exec ho-ns1 ip link set ho-veth1 up mtu 1500
          sudo ip netns exec ho-ns1 ip link set ho-veth2 up mtu 1500
          sudo ip netns exec ho-ns1 ip link set lo up
          sudo ip netns exec ho-ns1 \
            ip link add vxlan0 type vxlan id 77 dstport 4789 \
              local 10.99.1.1 remote 10.99.1.2 dev ho-veth1 nolearning
          sudo ip netns exec ho-ns1 ip addr add 10.244.77.1/24 dev vxlan0
          sudo ip netns exec ho-ns1 ip link set vxlan0 up
          sudo ip netns exec ho-ns1 ip neigh add 10.244.77.2 lladdr de:ad:00:00:00:02 dev vxlan0
          # Reduce underlay MTU to 1400 (overlay stays at default ~1450)
          sudo ip netns exec ho-ns1 ip link set ho-veth1 mtu 1400
          # Create bpffs pin directory (binary requires this to exist before attaching)
          sudo mkdir -p /sys/fs/bpf/ho-test
          # Run binary and capture human output
          sudo nsenter --net=/var/run/netns/ho-ns1 -- dist/vxlan-tracer \
            --overlay vxlan0 --underlay ho-veth1 \
            --bpf-dir bpf --pin-dir /sys/fs/bpf/ho-test \
            --duration 8s \
            >/tmp/human-frag.log 2>&1 &
          _PID=$!
          sleep 3
          # Send oversized traffic (inner 1360B ping → outer ~1410B > 1400B underlay)
          sudo ip netns exec ho-ns1 ping -c 3 -s 1360 -q 10.244.77.2 2>/dev/null || true
          wait $_PID 2>/dev/null || true
          echo "=== Human output ===" | tee -a /tmp/human-frag.log
          cat /tmp/human-frag.log
          # Assertions — exit 1 on any failure
          _FAIL=0
          grep -q "Verdict:"  /tmp/human-frag.log && echo "[PASS] contains Verdict:"  || { echo "[FAIL] missing Verdict:";  _FAIL=1; }
          grep -q "Evidence:" /tmp/human-frag.log && echo "[PASS] contains Evidence:" || { echo "[FAIL] missing Evidence:"; _FAIL=1; }
          grep -qE "VXLAN_FRAGMENTATION_OBSERVED|NO_ISSUE_OBSERVED|VXLAN_MTU_MISCONFIGURATION" /tmp/human-frag.log \
            && echo "[PASS] verdict present" || { echo "[FAIL] no recognized verdict"; _FAIL=1; }
          # Cleanup
          sudo ip netns del ho-ns1 2>/dev/null || true
          sudo rm -rf /sys/fs/bpf/ho-test 2>/dev/null || true
          [ "$_FAIL" = "0" ] || exit 1

      - name: Validate human output — PTB_SUPPRESSED
        run: |
          echo "=== Human output: PTB_SUPPRESSED ===" | tee /tmp/human-ptb.log
          # Use the proven VXLAN topology from setup-netns.sh (same as run-scenarios.sh).
          # Topology: ns1 (vxlan0 overlay + veth1 underlay) ↔ ns2 (veth2 injector).
          # PTBs sent from ns2/veth2 arrive at ns1/veth1 as INGRESS traffic.
          # iptables DROP in ns1 suppresses them before icmp_rcv.
          sudo bash scripts/setup-netns.sh 2>&1 | tail -5
          sudo ip netns exec ns1 iptables -I INPUT -p icmp --icmp-type 3/4 -j DROP
          # Create bpffs pin directory
          sudo mkdir -p /sys/fs/bpf/ho-ptb-test
          # Run binary inside ns1 for 10s; inject PTBs from ns2 after 2s
          sudo nsenter --net=/var/run/netns/ns1 -- dist/vxlan-tracer \
            --overlay vxlan0 --underlay veth1 \
            --bpf-dir bpf --pin-dir /sys/fs/bpf/ho-ptb-test \
            --vxlan-port 4789 --duration 10s \
            >>/tmp/human-ptb.log 2>&1 &
          _PID=$!
          sleep 2
          # Inject PTBs from ns2 toward ns1 (arrives as ingress on veth1)
          sudo ip netns exec ns2 python3 scripts/inject_ptb.py \
            --src 192.168.100.2 --dst 192.168.100.1 \
            --dev veth2 --next-hop-mtu 1400 --count 5 2>/dev/null || true
          wait $_PID 2>/dev/null || true
          echo "=== Human output ===" | tee -a /tmp/human-ptb.log
          cat /tmp/human-ptb.log
          _FAIL=0
          grep -q "Verdict:" /tmp/human-ptb.log && echo "[PASS] contains Verdict:" || { echo "[FAIL] missing Verdict:"; _FAIL=1; }
          grep -qE "PTB_SUPPRESSED|PTB_DELIVERED|NO_ISSUE_OBSERVED" /tmp/human-ptb.log \
            && echo "[PASS] verdict present" || { echo "[FAIL] no recognized verdict"; _FAIL=1; }
          # Cleanup
          sudo bash scripts/teardown-netns.sh 2>/dev/null || true
          sudo rm -rf /sys/fs/bpf/ho-ptb-test 2>/dev/null || true
          [ "$_FAIL" = "0" ] || exit 1

      - name: Upload human output logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: human-output-logs-x86_64
          path: |
            /tmp/human-frag.log
            /tmp/human-ptb.log
          if-no-files-found: ignore
          retention-days: 7
